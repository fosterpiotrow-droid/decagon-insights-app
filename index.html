<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpay -  Weekly Product Decagon Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .spinner { border: 3px solid #f3f4f6; border-top: 3px solid #6366f1; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .drag-drop-zone { transition: all 0.3s ease; }
        .drag-drop-zone.drag-over { background-color: #eef2ff; border-color: #6366f1; }
        .tab-button { position: relative; padding: 12px 24px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s ease; color: #6b7280; }
        .tab-button.active { color: #6366f1; border-bottom-color: #6366f1; }
        .tab-button:hover:not(:disabled) { color: #6366f1; }
        .tab-button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
    const { useState, useRef } = React;

    const formatDate = (ds) => {
        try { return new Date(ds).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
        catch { return ds || '-'; }
    };

    const parseWatchtowerFlags = (f) => {
        try { return f ? (typeof f === 'string' ? JSON.parse(f) : f) : []; } catch { return []; }
    };

    const deriveProductArea = (tags, summary) => {
      if (!tags && !summary) return 'General';
      const t = ((tags || '') + ' ' + (summary || '')).toLowerCase();
      // Perpay+ FIRST: credit reporting, subscription, membership, fees
      if (t.includes('perpay+') || t.includes('perpay plus') || t.includes('credit report') || t.includes('credit score') || t.includes('credit bureau') || t.includes('subscription') || t.includes('membership') || (t.includes('cancel') && (t.includes('subscription') || t.includes('membership') || t.includes('perpay+')))) return 'Perpay+';
      // Card: credit card, debit, visa, mastercard (NOT general 'credit' which could be credit reporting)
      if (t.includes('credit card') || t.includes('debit') || t.includes('visa') || t.includes('mastercard') || t.includes('card activation') || t.includes('card replace') || t.includes('lost card') || t.includes('stolen card') || t.includes('card lock') || t.includes('card block')) return 'Card';
      // Marketplace: shopping, orders, shipping, delivery, returns
      if (t.includes('marketplace') || t.includes('shopping') || t.includes('order') || t.includes('shipping') || t.includes('delivery') || t.includes('return') || t.includes('tracking') || t.includes('item') || t.includes('product') || t.includes('purchase')) return 'Marketplace';
      return 'General';
    }

    const isFlagged = (conv) => {
        const flags = parseWatchtowerFlags(conv['Watchtower Flags']);
        const cx = flags.find(f => (f.job_name || f.flagType || '') === 'CX by Intent');
        if (cx && (cx.rubric_score || cx.score) <= 3) return true;
        if (flags.find(f => ((f.job_name || f.flagType || '') + '').includes('Complaint') && f.flagged === true)) return true;
        const kws = ['frustrated','cancel','close account','refund','not working','broken','disappointed','angry'];
        if (kws.some(kw => (conv.Summary || '').toLowerCase().includes(kw))) return true;
        if (conv.Undeflected === 'True') return true;
        return false;
    };

    const getCXScore = (conv) => {
        const flags = parseWatchtowerFlags(conv['Watchtower Flags']);
        const f = flags.find(f => (f.job_name || f.flagType || '') === 'CX by Intent');
        return f ? (f.rubric_score || f.score) : null;
    };

    // --- Upload Tab -----------------------------------------------------------
    const UploadTab = ({ onDataLoaded, onAnalyzing, isAnalyzing, conversations, onInsightsGenerated }) => {
        const [dragOver, setDragOver] = useState(false);
        const [stats, setStats] = useState(null);
        const fileInputRef = useRef(null);

        const parseCSV = (file) => {
            Papa.parse(file, {
                header: true,
                dynamicTyping: false,
                skipEmptyLines: true,
                complete: (results) => {
                    if (results.data && results.data.length > 0) {
                        const s = calcStats(results.data);
                        setStats(s);
                        onDataLoaded(results.data);
                    }
                },
                error: (err) => alert('Error parsing CSV: ' + err.message)
            });
        };

        const calcStats = (data) => {
            let escalatedCount = 0;
            let cxScores = [];
            let dates = [];
            const channelCounts = {};
            data.forEach(row => {
                if (row.Undeflected === 'True') escalatedCount++;
                const s = getCXScore(row);
                if (s !== null) cxScores.push(parseFloat(s));
                if (row['Created At']) { try { dates.push(new Date(row['Created At'])); } catch {} }
                const ch = row['metadata._decagon_channel'] || 'Unknown';
                channelCounts[ch] = (channelCounts[ch] || 0) + 1;
            });
            const avgCXScore = cxScores.length > 0 ? (cxScores.reduce((a,b)=>a+b,0)/cxScores.length).toFixed(2) : 'N/A';
            const validDates = dates.filter(d => !isNaN(d));
            const dateRange = validDates.length > 0 ? {
                min: new Date(Math.min(...validDates)).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                max: new Date(Math.max(...validDates)).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            } : null;
            return { totalConversations: data.length, escalatedCount, avgCXScore, channelCounts, dateRange };
        };

        const KEYWORDS = ['frustrated','close account','cancel','refund','not working','broken','disappointed',
            'angry','worst','scam','stolen','unauthorized','never received','still waiting',
            'ridiculous','unacceptable','misleading','confused'];

        const handleAnalyze = async () => {
            onAnalyzing(true);
            try {
                const trunc = (s, max) => s && s.length > max ? s.substring(0, max) : s;
                const scored = conversations.map(c => {
                    let score = 0;
                    if (c['Undeflected'] === 'True') score += 10;
                    const sum = (c['Summary'] || '').toLowerCase();
                    KEYWORDS.forEach(kw => { if (sum.includes(kw)) score += 3; });
                    if (c['Customer Feedback'] && c['Customer Feedback'].trim().length > 10) score += 5;
                    try {
                        const flags = JSON.parse(c['Watchtower Flags'] || '[]');
                        if (Array.isArray(flags) && flags.length > 0) {
                            if (flags.find(f => (f.flagType || f.job_name) === 'CX by Intent' && (f.score || f.rubric_score) <= 3)) score += 8;
                            if (flags.find(f => ((f.flagType || f.job_name) + '').includes('Complaint') && f.flagged === true)) score += 6;
                        }
                    } catch(e) {}
                    return { conv: c, score };
                });
                const actionable = scored.filter(({ score }) => score > 0);
                if (actionable.length === 0) { alert('No actionable conversations found in this CSV.'); onAnalyzing(false); return; }
                const top = actionable.sort((a, b) => b.score - a.score).slice(0, 15);
                const convPayload = top.map(({ conv: c }) => ({
                    summary: trunc(c['Summary'] || '', 300),
                    tags: c['Tags'] || '',
                    customerFeedback: trunc(c['Customer Feedback'] || '', 150),
                    undeflected: c['Undeflected'] || '',
                    conversationUrl: c['Conversation URL'] || '',
                    createdAt: c['Created At'] || '',
                }));

                const resp = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversations: convPayload,
                        totalConversations: stats.totalConversations,
                        undeflectedCount: stats.escalatedCount,
                        dateRange: stats.dateRange ? { start: stats.dateRange.min, end: stats.dateRange.max } : {}
                    })
                });
                if (!resp.ok) {
                    const t = await resp.text();
                    let msg; try { msg = JSON.parse(t).error || t; } catch { msg = t; }
                    throw new Error(msg);
                }
                const data = await resp.json();
        // Transform lean API response to rich format with CSV enrichment
        const transformed = (() => {
            if (data.executiveSummary) return data;
            const th = data.themes || [];
            const tot = stats.totalConversations || 1;
            const usedQuoteTexts = new Set();
            const enrichedThemes = th.map((t, i) => {
            const kws = (t.keywords || t.theme || '').toLowerCase().split(/[,\s]+/).filter(w => w.length > 3 && !STOP_WORDS.includes(w));
              const matched = conversations.filter(c => {
                const sum = ((c['Summary'] || c.Summary || '') + ' ' + (c['Tags'] || '')).toLowerCase();
                let hits = 0;
                kws.forEach(kw => { if (sum.includes(kw)) hits++; });
                return hits >= 1;
              });
              const count = matched.length > 0 ? matched.length : Math.round(tot * Math.max(3, 18 - i * 3) / 100);
              const pct = tot > 0 ? Math.round((count / tot) * 1000) / 10 : 0;
              // Theme-specific quotes: must contain a theme keyword AND not already used
              const signals = [];
                // Pass 1: Real USER messages from transcripts matching keywords
                matched.forEach(c => {
                  if (signals.length >= 3) return;
                  const userMsgs = extractUserQuotes(c, kws);
                  userMsgs.forEach(msg => {
                    if (signals.length < 3 && !usedQuoteTexts.has(msg)) {
                      signals.push(msg);
                  usedQuoteTexts.add(msg);
                }
              });
            });
              const escalated = matched.filter(c => c['Undeflected'] === 'True').length;
              return {
                theme: t.theme,
                productArea: t.area || 'General',
                conversationCount: count,
                volumePct: pct,
                severity: t.severity || 'Medium',
                summary: t.summary || '',
                customerSignals: signals,
                impact: t.impact || '',
                rootCause: t.rootCause || '',
                opportunity: t.opportunity || '',
                recommendations: t.opportunity ? [t.opportunity] : [],
                escalatedCount: escalated,
                keywords: t.keywords || ''
              };
            });
            const topIssues = enrichedThemes.slice(0, 5).map(t => ({
              title: t.theme,
              pct: t.volumePct,
              convos: t.conversationCount,
              description: t.summary
            }));
            return {
              executiveSummary: { narrative: data.narrative || '', topIssues },
              themes: enrichedThemes
            };
          })();
        onInsightsGenerated(transformed, stats);
            } catch (err) {
                alert('Analysis failed: ' + err.message);
            } finally {
                onAnalyzing(false);
            }
        };

        return (
            <div className="fade-in">
                <div
                    className={`drag-drop-zone border-2 border-dashed rounded-xl p-12 text-center cursor-pointer hover:border-indigo-400 ${dragOver ? 'drag-over' : 'border-gray-300'}`}
                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={(e) => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) parseCSV(f); else alert('Please drop a CSV file'); }}
                    onClick={() => fileInputRef.current?.click()}
                >
                    <div className="text-4xl mb-4"></div>
                    <h3 className="text-xl font-semibold text-gray-900 mb-2">Upload Decagon CSV</h3>
                    <p className="text-gray-600 mb-4">Drag and drop your CSV file here, or click to browse</p>
                    <input ref={fileInputRef} type="file" accept=".csv" onChange={(e) => { if (e.target.files[0]) parseCSV(e.target.files[0]); }} className="hidden" />
                    <button className="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Select File</button>
                </div>

                {stats && (
                    <div className="mt-8 fade-in">
                        <h3 className="text-xl font-bold text-gray-900 mb-4">Upload Summary</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm">
                                <p className="text-gray-500 text-sm font-medium mb-1">Total Conversations</p>
                                <p className="text-3xl font-bold text-indigo-600">{stats.totalConversations.toLocaleString()}</p>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm">
                                <p className="text-gray-500 text-sm font-medium mb-1">Undeflected</p>
                                <p className="text-3xl font-bold text-red-500">{stats.escalatedCount.toLocaleString()}</p>
                                <p className="text-xs text-gray-400">{stats.totalConversations > 0 ? Math.round(stats.escalatedCount/stats.totalConversations*100) : 0}% needed human</p>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm">
                                <p className="text-gray-500 text-sm font-medium mb-1">Avg CX Score</p>
                                <p className="text-3xl font-bold text-emerald-500">{stats.avgCXScore}</p>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm">
                                <p className="text-gray-500 text-sm font-medium mb-1">Date Range</p>
                                <p className="text-sm font-semibold text-gray-900">{stats.dateRange ? `${stats.dateRange.min} - ${stats.dateRange.max}` : 'N/A'}</p>
                            </div>
                        </div>
                        <button
                            onClick={handleAnalyze}
                            disabled={isAnalyzing}
                            className="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                        >
                            {isAnalyzing && <div className="spinner"></div>}
                            {isAnalyzing ? 'Analyzing conversations...' : 'Analyze & Generate Report'}
                        </button>
                    </div>
                )}

                {!stats && (
                    <div className="mt-12 text-center text-gray-500">
                        <p className="text-lg"> Start by uploading a Decagon CSV file</p>
                    </div>
                )}
            </div>
        );
    };

    // --- Insights Report Tab --------------------------------------------------
    const InsightsReportTab = ({ insightsData, csvStats, onPublish, isPublishing }) => {
      if (!insightsData) {
        return (
          <div className="text-center py-16">
            <p className="text-gray-400 text-lg">Upload and analyze a CSV to see the weekly insights report</p>
          </div>
        );
      }

      const { executiveSummary = {}, themes = [] } = insightsData;
      const topIssues = executiveSummary.topIssues || [];
      const narrative = executiveSummary.narrative || '';

      const renderNarrative = (text) => {
        const parts = text.split(/\*\*(.*?)\*\*/g);
        return parts.map((p, i) => i % 2 === 1 ? <strong key={i}>{p}</strong> : p);
      };

      const total = csvStats?.totalConversations || 0;
      const undeflectedCount = csvStats?.escalatedCount || 0;
      const undeflectedPct = total > 0 ? Math.round((undeflectedCount / total) * 100) : 0;
      const dateRange = csvStats?.dateRange ? csvStats.dateRange.min + ' - ' + csvStats.dateRange.max : 'N/A';
      const avgCX = csvStats?.avgCXScore || ' - ';

      const areaTagStyle = {
        'Card': 'bg-blue-100 text-blue-800',
        'Perpay+': 'bg-purple-100 text-purple-800',
        'Marketplace': 'bg-green-100 text-green-800',
        'Core': 'bg-slate-100 text-slate-700',
        'General': 'bg-slate-100 text-slate-700',
      };
      const severityBorderStyle = {
        'Critical': 'border-red-500',
        'High': 'border-orange-400',
        'Medium': 'border-amber-300',
        'Low': 'border-green-400',
      };

      return (
        <div className="fade-in">
          {/* -- Stats Bar -- */}
          <div className="grid grid-cols-2 md:grid-cols-5 border border-gray-200 rounded-xl overflow-hidden mb-6 bg-white shadow-sm">
            <div className="p-5 border-r border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Reporting Week</p>
              <p className="text-sm font-bold text-gray-900 leading-tight">{dateRange}</p>
            </div>
            <div className="p-5 border-r border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Conversations</p>
              <p className="text-2xl font-bold text-gray-900">{total.toLocaleString()}</p>
              <p className="text-xs text-gray-400">total analyzed</p>
            </div>
            <div className="p-5 border-r border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Undeflected</p>
              <p className="text-2xl font-bold text-red-500">{undeflectedPct}%</p>
              <p className="text-xs text-gray-400">{undeflectedCount.toLocaleString()} needed human</p>
            </div>
            <div className="p-5 border-r border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Retention Risk</p>
              <p className="text-2xl font-bold text-gray-300"> - </p>
              <p className="text-xs text-gray-400">not tracked</p>
            </div>
            <div className="p-5">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">CSAT</p>
              <p className="text-2xl font-bold text-gray-900">{avgCX}</p>
              <p className="text-xs text-gray-400">avg CX score</p>
            </div>
          </div>

          {/* -- Product Head Read Card -- */}
          <div className="rounded-xl p-7 mb-8" style={{background: '#1a3354'}}>
            <p className="text-xs font-bold tracking-widest uppercase mb-4" style={{color: '#64748b'}}>
              PRODUCT HEAD READ
            </p>
            <h2 className="text-2xl font-bold text-white mb-1">{dateRange}</h2>
            <p className="text-sm mb-6" style={{color: '#7ea0c0'}}>
              {total.toLocaleString()} conversations | {undeflectedPct}% undeflected | {themes.length} friction themes detected
            </p>

            {topIssues.length > 0 && (
              <>
                <p className="text-xs font-bold uppercase tracking-widest mb-3" style={{color: '#fbbf24'}}>
                  TOP {topIssues.length} PRIORITY ISSUES THIS WEEK
                </p>
                <ol className="space-y-3 mb-6">
                  {topIssues.map((issue, i) => (
                    <li key={i} className="flex gap-3 text-sm" style={{color: '#e2e8f0'}}>
                      <span className="flex-shrink-0 font-bold w-4" style={{color: '#64748b'}}>{i + 1}</span>
                      <span>
                        <strong className="text-white">{issue.title} ({issue.pct}%, {(issue.convos || 0).toLocaleString()} convos)</strong>
                        {' '}- {issue.description}
                      </span>
                    </li>
                  ))}
                </ol>
              </>
            )}

            {narrative && (
              <p className="text-sm leading-relaxed" style={{color: '#94a3b8'}}>
                {renderNarrative(narrative)}
              </p>
            )}
          </div>

          {/* -- Friction Themes -- */}
          <div className="mb-8">
            <div className="flex items-center gap-2 mb-5">
              <h3 className="text-lg font-bold text-gray-900">Friction Themes</h3>
              <span className="text-sm text-gray-400"> - {themes.length} patterns | sorted by severity then volume</span>
            </div>

            <div className="space-y-5">
              {themes.map((theme, idx) => {
                const area = theme.productArea || theme.product_area || 'General';
                const borderClass = severityBorderStyle[theme.severity] || 'border-gray-200';
                const tagClass = areaTagStyle[area] || areaTagStyle['General'];
                const signals = Array.isArray(theme.customerSignals) ? theme.customerSignals : [];
                const highVolume = (theme.volumePct || 0) >= 10;

                return (
                  <div key={idx} className={"border-l-4 " + borderClass + " bg-white rounded-r-xl shadow-sm"}>
                    <div className="p-6">
                      {/* Area tag + volume */}
                      <div className="flex items-start justify-between mb-3">
                        <span className={"text-xs font-bold px-2.5 py-1 rounded uppercase tracking-wide " + tagClass}>
                          {area}
                        </span>
                        <div className="text-right">
                          <p className={"text-sm font-bold " + (highVolume ? 'text-red-600' : 'text-gray-700')}>
                            {(theme.conversationCount || 0).toLocaleString()} convos | {theme.volumePct || 0}%
                          </p>
                          <p className="text-xs text-gray-400">of week's volume</p>
                        </div>
                      </div>

                      {/* Title */}
                      <h4 className="text-xl font-bold text-gray-900 mb-4">{theme.theme}</h4>

                      {/* Summary */}
                      <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Summary</p>
                      <p className="text-sm text-gray-700 leading-relaxed mb-5">{theme.summary}</p>

                      {/* Customer Signals */}
                      {signals.length > 0 && (
                        <div className="mb-5">
                          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Customer Signals</p>
                          <div className="space-y-2">
                            {signals.map((sig, i) => (
                              <div key={i} className="bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-700 italic leading-relaxed">
                                "{sig}"
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Why This Matters + Root Cause side by side */}
                      {(theme.impact || theme.rootCause) && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
                          {theme.impact && (
                            <div>
                              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Why This Matters</p>
                              <p className="text-sm text-gray-700 leading-relaxed">{theme.impact}</p>
                            </div>
                          )}
                          {theme.rootCause && (
                            <div>
                              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Root Cause Hypothesis</p>
                              <p className="text-sm text-gray-700 leading-relaxed">{theme.rootCause}</p>
                            </div>
                          )}
                        </div>
                      )}

                      {/* Opportunity */}
                      {theme.opportunity && (
                        <div>
                          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Opportunity</p>
                          <div className="bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 text-sm text-indigo-900 leading-relaxed">
                            {theme.opportunity}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Publish button */}
          <div className="mt-8 pt-6 border-t border-gray-200">
            <button
              onClick={onPublish}
              disabled={isPublishing}
              className="w-full px-6 py-3 bg-emerald-500 text-white rounded-lg font-semibold hover:bg-emerald-600 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
            >
              {isPublishing && <div className="spinner"></div>}
              {isPublishing ? 'Publishing...' : 'Publish to Confluence'}
            </button>
          </div>
        </div>
      );
    };

    // --- By Product Area Tab --------------------------------------------------
    const STOP_WORDS = ['about','after','their','there','these','would','could','should','being','through','between','before','other','which','while','where','again','further','then','once','here','both','each','more','some','such','than','into','over','only','very','just','also','with','from','this','that','have','been','were','will','what','when','they','them','your','does','doing','done','made','make','most','must','like','know','take'];

    
      // Extract real verbatim USER messages from conversation transcripts
    const extractUserQuotes = (conversation, keywords) => {
      const fmtMsgs = (conversation['Formatted Messages'] || '').toString();
      if (!fmtMsgs || !keywords || keywords.length === 0) return [];

      // Split on [USER] and [AI] markers - only take USER blocks
      const blocks = fmtMsgs.split(/\[(USER|AI)\]\n?/);
      const userMsgs = [];

      const noisePatterns = [
        /^\d{2}\/\d{2}/, /^(yes|no|ok|okay|sure|thanks|thank you|hi|hello|hey)$/i,
        /\b(social|ssn|date of birth|phone number|last four|verify)\b/i,
        /^\d[\d\s\-]{6,}/, /Sent from my iPhone$/i,
        /^(january|february|march|april|may|june|july|august|september|october|november|december)\s/i,
        /^\w+\s+\d{1,2}(st|nd|rd|th)?\s+(\d{4}|nineteen|twenty)/i,
        /^[A-Z][a-z]+\s+\d/, /^Subject:/i, /^Re:/i, /^Fwd:/i,
        /thank you for (contacting|reaching|calling)/i,
        /how can (I|we) (help|assist)/i, /is there anything else/i
      ];

      for (let i = 0; i < blocks.length; i++) {
        if (blocks[i] === 'USER' && blocks[i + 1]) {
          let msg = blocks[i + 1].trim().replace(/\n/g, ' ').trim();
          msg = msg.replace(/\s*Sent from my iPhone\s*$/i, '').trim();
          msg = msg.replace(/^Subject:\s*[^\n]*\n?\s*/i, '').trim();
          // Remove any leaked AI/agent text patterns
          msg = msg.replace(/\[AI\].*/i, '').trim();
          msg = msg.replace(/Thank you for contacting.*/i, '').trim();

          if (msg.length < 40 || msg.length > 500) continue;
          if (noisePatterns.some(p => p.test(msg))) continue;

          // Must contain substance (complaint/request language)
          const hasSubstance = /\b(want|need|try|can't|cannot|doesn't|didn't|won't|not|never|still|been|waiting|issue|problem|charge|pay|order|card|deposit|refund|deliver|ship|cancel|close|lost|stolen|fraud|replace|receive|arrive|report|score|fee|subscription|membership)\b/i.test(msg);
          if (!hasSubstance) continue;

          userMsgs.push(msg);
        }
      }

      // Filter to only messages containing a theme keyword
      const kwMatched = userMsgs.filter(m => {
        const mLow = m.toLowerCase();
        return keywords.some(kw => mLow.includes(kw));
      });

      // Score by actionability: frustration, urgency, specific complaints
      const scoreQuote = (q) => {
        let s = 0;
        const ql = q.toLowerCase();
        // Strong frustration / emotion
        if (/\b(frustrated|furious|angry|upset|ridiculous|unacceptable|terrible|horrible|worst|disgusted|livid)\b/i.test(q)) s += 3;
        // Impact statements
        if (/\b(can't pay|can't use|can't access|locked out|lost money|overcharged|unauthorized|wrong amount|never received|still waiting|been waiting|months|weeks)\b/i.test(q)) s += 3;
        // Specific ask / actionable
        if (/\b(cancel|refund|close|fix|resolve|escalate|supervisor|manager|report|dispute|credit)\b/i.test(q)) s += 2;
        // Complaint verbs
        if (/\b(doesn't|didn't|won't|can't|cannot|not working|broken|failed|error|wrong)\b/i.test(q)) s += 1;
        // Longer = more detail = more useful
        if (q.length > 150) s += 1;
        return s;
      };

      // Sort by actionability score (highest first)
      kwMatched.sort((a, b) => scoreQuote(b) - scoreQuote(a));
      return kwMatched;
    };

      const deriveTopIssues = (areaConvs) => {
      if (areaConvs.length === 0) return [];
      // Extract bigrams from summaries for clustering
      const bigramCounts = {};
      areaConvs.forEach(c => {
        const words = (c['Summary'] || '').toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 3 && !STOP_WORDS.includes(w));
        const seen = new Set();
        for (let i = 0; i < words.length - 1; i++) {
          const bg = words[i] + ' ' + words[i+1];
          if (!seen.has(bg)) { bigramCounts[bg] = (bigramCounts[bg] || 0) + 1; seen.add(bg); }
        }
      });
      const topBigrams = Object.entries(bigramCounts)
        .filter(([, count]) => count >= 3)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 30)
        .map(([bg]) => bg);
      // Build clusters: each bigram groups its matching conversations
      const groups = [];
      const assigned = new Set();
      const usedQuoteTexts = new Set();
      topBigrams.forEach(bg => {
        if (groups.length >= 5) return;
        const matching = areaConvs.filter((c, idx) => {
          if (assigned.has(idx)) return false;
          return (c['Summary'] || '').toLowerCase().includes(bg);
        });
        if (matching.length < 2) return;
        matching.forEach(c => assigned.add(areaConvs.indexOf(c)));
        // Find secondary bigrams within this cluster for compound title
        const clusterBigrams = {};
        matching.forEach(c => {
          const words = (c['Summary'] || '').toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 3 && !STOP_WORDS.includes(w));
          const seen = new Set();
          for (let i = 0; i < words.length - 1; i++) {
            const b2 = words[i] + ' ' + words[i+1];
            if (!seen.has(b2) && b2 !== bg) { clusterBigrams[b2] = (clusterBigrams[b2] || 0) + 1; seen.add(b2); }
          }
        });
        const secondary = Object.entries(clusterBigrams).filter(([, n]) => n >= 2).sort((a, b) => b[1] - a[1]).slice(0, 2).map(([b2]) => b2);
        // Build compound title
        const titleize = (s) => s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        let title = titleize(bg);
        if (secondary.length > 0) title += ' + ' + titleize(secondary[0]);
        if (secondary.length > 1) title += ' — ' + titleize(secondary[1]);
        // Get theme-specific quotes only (must contain a cluster keyword)
        const bgWords = bg.split(' ');
        const quotes = [];
          const titleKws = title.toLowerCase().split(/\s+/).filter(w => w.length > 3 && !STOP_WORDS.includes(w));
          // Pass 1: Real USER messages from transcripts matching title keywords
          matching.forEach(c => {
            if (quotes.length >= 3) return;
            const userMsgs = extractUserQuotes(c, titleKws);
            userMsgs.forEach(msg => {
              if (quotes.length < 3 && !usedQuoteTexts.has(msg)) {
                quotes.push(msg);
                usedQuoteTexts.add(msg);
              }
            });
          });
          groups.push({
          theme: title,
          keyword: bg,
          count: matching.length,
          escalated,
          escalatedPct,
          severity: escalatedPct > 50 ? 'Critical' : escalatedPct > 30 ? 'High' : escalatedPct > 15 ? 'Medium' : 'Low',
          quotes,
          summary,
          recommendations: recs.slice(0, 3),
          rootCause: secondary.length > 0 ? 'Pattern suggests ' + bg + ' issues are linked to ' + secondary.join(' and ') + ' problems.' : '',
          conversations: matching,
          quotes: quotes,
          summary: matching.length + ' conversations about ' + title.toLowerCase() + '. ' + matching.filter(c => (c['Undeflected'] || '') === 'True').length + ' required human escalation.'
        });
      });
      return groups.sort((a, b) => b.count - a.count).slice(0, 3);
    };

    
    const ConversationsTab = ({ conversations, insightsData }) => {
      const [activeArea, setActiveArea] = useState('Card');

      if (!conversations || conversations.length === 0) {
        return <div className="text-center py-12"><p className="text-gray-400 text-lg">Upload data to see product area breakdowns</p></div>;
      }

      const areas = ['Card', 'Marketplace', 'Perpay+', 'General'];
      const areaColors = {
        'Card': '#2563eb',
        'Marketplace': '#16a34a',
        'Perpay+': '#9333ea',
        'General': '#475569'
      };
      const sevColors = { 'Critical': '#dc2626', 'High': '#ea580c', 'Medium': '#d97706', 'Low': '#16a34a' };

      // Group conversations by area
      const areaConvMap = {};
      areas.forEach(a => { areaConvMap[a] = []; });
      conversations.forEach(c => {
        const a = deriveProductArea(c['Tags'] || c.Tags || '', c['Summary'] || '');
        if (areaConvMap[a]) areaConvMap[a].push(c);
        else areaConvMap['General'].push(c);
      });

      // Get AI themes for this area (if analysis has been run)
      const allThemes = insightsData?.themes || [];
      const aiThemesForArea = allThemes.filter(t => (t.productArea || 'General') === activeArea);

      // Derive top 3 issues from CSV data
      const csvIssues = deriveTopIssues(areaConvMap[activeArea]);

      // Merge: AI themes first (enriched with CSV quotes), then CSV-derived issues
      const buildCards = () => {
        const cards = [];
        const usedQuoteTexts = new Set();
        const areaConvs = areaConvMap[activeArea] || [];

        // Combine AI themes and CSV-derived issues, deduplicating
        const seenThemes = new Set();
        const allIssues = [];

        // AI themes first (richer data)
        aiThemesForArea.forEach(t => {
          allIssues.push({
            theme: t.theme, count: t.conversationCount || 0, severity: t.severity || 'Medium',
            summary: t.summary || '', impact: t.impact || '', rootCause: t.rootCause || '',
            opportunity: t.opportunity || '', recommendations: t.recommendations || [],
            keywords: (t.keywords || '') + ' ' + (t.theme || ''), matchedConvs: null
          });
          (t.theme || '').toLowerCase().split(/\s+/).forEach(w => { if (w.length > 3) seenThemes.add(w); });
        });

        // CSV issues (have matched conversations)
        csvIssues.forEach(t => {
          const csvWords = (t.theme || '').toLowerCase().split(/\s+/);
          const isDupe = csvWords.some(w => w.length > 3 && seenThemes.has(w));
          if (!isDupe) {
            allIssues.push({
              theme: t.theme, count: t.count || 0, severity: t.severity || 'Medium',
              summary: '', impact: '', rootCause: t.rootCause || '',
              opportunity: '', recommendations: t.recommendations || [],
              keywords: (t.keyword || '') + ' ' + (t.theme || ''), matchedConvs: t.conversations || []
            });
          }
        });

        // Sort by count descending, take top 3
        allIssues.sort((a, b) => (b.count || 0) - (a.count || 0));

        allIssues.slice(0, 3).forEach(issue => {
          // Match conversations to this issue by keywords
          const kws = issue.keywords.toLowerCase().split(/[\s,]+/)
            .filter(w => w.length > 3 && !STOP_WORDS.includes(w));

          const matched = issue.matchedConvs || areaConvs.filter(c => {
            const sum = ((c['Summary'] || '') + ' ' + (c['Tags'] || '')).toLowerCase();
            return kws.some(kw => sum.includes(kw));
          });

          // Extract up to 3 real verbatim customer quotes from transcripts
          const quotes = [];
          // Pass 1: Real USER messages from transcripts that match keywords
          matched.forEach(c => {
            if (quotes.length >= 3) return;
            const userMsgs = extractUserQuotes(c, kws);
            userMsgs.forEach(msg => {
              if (quotes.length < 3 && !usedQuoteTexts.has(msg)) {
                quotes.push(msg);
                usedQuoteTexts.add(msg);
              }
            });
          });
          const escalated = matched.filter(c => (c['Undeflected'] || '') === 'True').length;
          const summaryText = issue.summary ||
            matched.length + ' conversations about ' + issue.theme.toLowerCase() + '. ' +
            escalated + ' (' + (matched.length > 0 ? Math.round(escalated / matched.length * 100) : 0) + '%) required human escalation.';

          cards.push({
            theme: issue.theme,
            count: matched.length || issue.count || 0,
            severity: issue.severity,
            summary: summaryText,
            quotes: quotes,
            impact: issue.impact || 'Increases support volume and customer friction in ' + activeArea + '.',
            rootCause: issue.rootCause || 'Pattern detected from conversation clustering.',
            opportunity: issue.opportunity || '',
            recommendations: issue.recommendations || [],
          });
        });

        return cards;
      };

      const cards = buildCards();
      const areaCount = areaConvMap[activeArea].length;
      const areaColor = areaColors[activeArea] || '#475569';

      return (
        <div className="fade-in">
          {/* Area Tabs */}
          <div className="flex gap-0 border-b border-gray-200 mb-6 overflow-x-auto">
            {areas.map(area => {
              const count = areaConvMap[area].length;
              return (
                <button
                  key={area}
                  onClick={() => setActiveArea(area)}
                  className={"px-5 py-3 text-sm font-semibold border-b-3 transition whitespace-nowrap " + (activeArea === area ? '' : 'border-transparent text-gray-400 hover:text-gray-600')}
                  style={activeArea === area ? { color: areaColors[area], borderBottom: '3px solid ' + areaColors[area] } : { borderBottom: '3px solid transparent' }}
                >
                  {area} <span className="text-xs font-normal text-gray-400 ml-1">({count.toLocaleString()})</span>
                </button>
              );
            })}
          </div>

          {/* Area Header */}
          <div className="rounded-xl p-6 mb-6 text-white" style={{ backgroundColor: areaColor }}>
            <h2 className="text-2xl font-bold mb-1">{activeArea} - Product Insights</h2>
            <p className="text-sm opacity-80">{areaCount.toLocaleString()} {activeArea}-tagged conversations</p>
          </div>

          {/* Issue Cards */}
          {cards.length === 0 ? (
            <div className="text-center py-12 bg-white rounded-xl shadow-sm">
              <p className="text-gray-400">No significant issue patterns found for {activeArea}. Try uploading a larger dataset.</p>
            </div>
          ) : (
            <div className="space-y-6">
              {cards.map((card, idx) => {
                const sev = card.severity || 'Medium';
                const headerBg = sevColors[sev] || '#d97706';
                const freq = card.count > 300 ? 'HIGH' : card.count > 100 ? 'MED' : 'LOW';
                const retRisk = sev === 'Critical' || sev === 'High' ? 'HIGH' : 'MEDIUM';

                return (
                  <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    {/* Issue Title Header */}
                    <div className="px-6 py-4 flex items-center justify-between" style={{ backgroundColor: headerBg }}>
                      <h3 className="text-white font-bold text-lg flex-1 mr-4">{card.theme}</h3>
                      <span className="bg-white bg-opacity-20 text-white text-xs font-bold px-3 py-1 rounded uppercase flex-shrink-0">{sev}</span>
                    </div>

                    {/* Metadata Row */}
                    <div className="px-6 py-3 bg-gray-50 border-b border-gray-200 flex flex-wrap gap-4 text-sm">
                      <span><strong>Product:</strong> {activeArea}</span>
                      <span><strong>Frequency:</strong> <span className={"text-xs font-bold px-2 py-0.5 rounded " + (freq === 'HIGH' ? 'bg-green-100 text-green-700' : freq === 'MED' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700')}>{freq} - {card.count.toLocaleString()} CONVOS</span></span>
                      <span><strong>Retention Risk:</strong> <span className={"text-xs font-bold px-2 py-0.5 rounded " + (retRisk === 'HIGH' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700')}>{retRisk}</span></span>
                    </div>

                    <div className="p-6 space-y-6">
                      {/* Summary */}
                      <div>
                        <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Summary</p>
                        <p className="text-sm text-gray-800 leading-relaxed">{card.summary}</p>
                      </div>

                      {/* Customer Signals (Verbatim) */}
                      {card.quotes.length > 0 && (
                        <div>
                          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Customer Signals (Verbatim)</p>
                          <div className="space-y-2">
                            {card.quotes.map((q, i) => (
                              <div key={i} className="border-l-4 border-amber-400 bg-amber-50 px-4 py-3 text-sm text-gray-700 italic leading-relaxed">
                                "{q}"
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Why This Matters + Root Cause */}
                      {(card.impact || card.rootCause) && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {card.impact && (
                            <div>
                              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Why This Matters</p>
                              <p className="text-sm text-gray-700 leading-relaxed">{card.impact}</p>
                            </div>
                          )}
                          {card.rootCause && (
                            <div>
                              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Root Cause Hypothesis</p>
                              <p className="text-sm text-gray-700 leading-relaxed">{card.rootCause}</p>
                            </div>
                          )}
                        </div>
                      )}

                      {/* Opportunity / Recommendation */}
                      {((card.recommendations && card.recommendations.length > 0) || card.opportunity) && (
                        <div>
                          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Opportunity / Recommendation</p>
                          <div className="border-l-4 border-green-400 bg-green-50 px-5 py-4 rounded-r-lg">
                            {card.recommendations && card.recommendations.length > 0
                              ? card.recommendations.map((rec, ri) => (
                                  <p key={ri} className="text-sm text-gray-800 leading-relaxed mb-1 last:mb-0">{ri + 1}. {rec}</p>
                                ))
                              : <p className="text-sm text-gray-800 leading-relaxed">1. {card.opportunity}</p>
                            }
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // --- Confluence Sync Tab --------------------------------------------------
    const ConfluenceSyncTab = ({ insightsData, csvStats }) => {
        const [pageId, setPageId] = useState('44859393');
        const [publishStatus, setPublishStatus] = useState(null);
        const [lastPublished, setLastPublished] = useState(null);

        const handlePublish = async () => {
            setPublishStatus('publishing');
            try {
                const resp = await fetch('/.netlify/functions/publish-confluence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pageId, insights: insightsData, csvStats })
                });
                if (!resp.ok) throw new Error(await resp.text());
                setLastPublished(new Date());
                setPublishStatus('success');
                setTimeout(() => setPublishStatus(null), 5000);
            } catch (err) {
                setPublishStatus('error');
                alert('Publish failed: ' + err.message);
                setTimeout(() => setPublishStatus(null), 3000);
            }
        };

        return (
            <div className="fade-in">
                {!insightsData ? (
                    <div className="text-center py-12 bg-white rounded-xl shadow-sm">
                        <p className="text-gray-400 text-lg"> Generate insights first to publish</p>
                    </div>
                ) : (
                    <div className="space-y-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-xl font-bold text-gray-900 mb-4">Confluence Connection</h3>
                            <div className="mb-4">
                                <p className="text-sm text-gray-600 mb-2">Page ID</p>
                                <input type="text" value={pageId} onChange={(e) => setPageId(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                            </div>
                            <div className="mb-4 p-4 bg-emerald-50 border border-emerald-200 rounded-lg">
                                <p className="text-sm text-emerald-800 font-medium">(ok) Connected to perpay.atlassian.net</p>
                            </div>
                            {lastPublished && <p className="text-sm text-gray-500 mb-4">Last published: {lastPublished.toLocaleString()}</p>}
                            {publishStatus === 'success' && <div className="mb-4 p-4 bg-emerald-50 border border-emerald-200 rounded-lg"><p className="text-sm text-emerald-800 font-medium">(ok) Successfully published to Confluence!</p></div>}
                            {publishStatus === 'publishing' && <div className="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg flex items-center gap-2"><div className="spinner"></div><p className="text-sm text-blue-800">Publishing...</p></div>}
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-xl font-bold text-gray-900 mb-4">Themes Preview</h3>
                            <div className="space-y-2">
                                {(insightsData.themes || []).map((t, i) => (
                                    <div key={i} className="flex items-start gap-2 text-sm py-2 border-b border-gray-100 last:border-0">
                                        <span className="font-bold text-gray-300 w-5 flex-shrink-0">{i+1}.</span>
                                        <div>
                                            <strong className="text-gray-900">{t.theme}</strong>
                                            <span className="text-gray-500"> -  {(t.summary || '').substring(0, 100)}{(t.summary || '').length > 100 ? '...' : ''}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button
                            onClick={handlePublish}
                            disabled={publishStatus === 'publishing'}
                            className="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                        >
                            {publishStatus === 'publishing' && <div className="spinner"></div>}
                            {publishStatus === 'publishing' ? 'Publishing...' : ' Publish to Confluence'}
                        </button>
                    </div>
                )}
            </div>
        );
    };

    // --- App ------------------------------------------------------------------
    const App = () => {
        const [activeTab, setActiveTab] = useState('upload');
        const [csvData, setCsvData] = useState(null);
        const [csvStats, setCsvStats] = useState(null);
        const [insightsData, setInsightsData] = useState(null);
        const [isAnalyzing, setIsAnalyzing] = useState(false);

        const handleInsightsGenerated = (data, stats) => {
            setInsightsData(data);
            setCsvStats(stats);
            setIsAnalyzing(false);
            setActiveTab('insights');
        };

        const tabs = [
            { key: 'upload',        label: 'Upload',           disabled: false },
            { key: 'insights',      label: 'Insights Report',  disabled: !insightsData },
            { key: 'conversations', label: 'By Product Area',  disabled: !csvData },
            { key: 'confluence',    label: 'Confluence Sync',  disabled: false },
        ];

        return (
            <div className="min-h-screen bg-gray-50">
                <header className="bg-white shadow-sm sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-6 py-5">
                        <div className="flex items-center gap-3">
                            
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">Perpay -  Weekly Product Decagon Insights</h1>
                                <p className="text-sm text-gray-500 mt-0.5">Upload Decagon CSV > Auto-analyze > Publish to Confluence</p>
                            </div>
                        </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto px-6 py-8">
                    <div className="flex gap-0 border-b border-gray-200 bg-white rounded-t-xl overflow-hidden">
                        {tabs.map(({ key, label, disabled }) => (
                            <button key={key}
                                onClick={() => !disabled && setActiveTab(key)}
                                disabled={disabled}
                                className={`tab-button ${activeTab === key ? 'active' : ''}`}>
                                {label}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-b-xl p-8 min-h-96 shadow-sm">
                        {activeTab === 'upload' && (
                            <UploadTab
                                onDataLoaded={setCsvData}
                                onAnalyzing={setIsAnalyzing}
                                isAnalyzing={isAnalyzing}
                                conversations={csvData}
                                onInsightsGenerated={handleInsightsGenerated}
                            />
                        )}
                        {activeTab === 'insights' && (
                            <InsightsReportTab
                                insightsData={insightsData}
                                csvStats={csvStats}
                                onPublish={() => setActiveTab('confluence')}
                                isPublishing={false}
                            />
                        )}
                        {activeTab === 'conversations' && (
                            <ConversationsTab conversations={csvData} insightsData={insightsData} />
                        )}
                        {activeTab === 'confluence' && (
                            <ConfluenceSyncTab insightsData={insightsData} csvStats={csvStats} />
                        )}
                    </div>
                </main>

                <footer className="bg-white border-t border-gray-200 mt-12">
                    <div className="max-w-7xl mx-auto px-6 py-5 text-center text-sm text-gray-400">
                        Perpay -  Weekly Product Decagon Insights Tool
                    </div>
                </footer>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
